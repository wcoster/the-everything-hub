<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#080d1e"/>
      <stop offset="1" stop-color="#06091a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>
  <!-- Spokes -->
  <line x1="16" y1="5"  x2="16" y2="9"  stroke="url(#accent)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="23" x2="16" y2="27" stroke="url(#accent)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="5"  y1="16" x2="9"  y2="16" stroke="url(#accent)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="23" y1="16" x2="27" y2="16" stroke="url(#accent)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Inner hub dot -->
  <circle cx="16" cy="16" r="3.5" fill="url(#accent)"/>
</svg>
